[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-path/platform-ff540000.usb-usbv2-0:1.4:1.0-port0
restart_method: command

[force_move]
enable_force_move: True

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 1500
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0
max_z_velocity: 8
max_z_accel: 100

[output_pin motor_power]
pin: PD0
value: 1

[stepper_x]
step_pin: PB9
dir_pin: !PC13
enable_pin: !PD7
rotation_distance: 40
microsteps: 16
endstop_pin: ^PE9
position_endstop: 310
position_max: 310
position_min: 0
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PE6
enable_pin: !PD7
rotation_distance: 40
microsteps: 16
endstop_pin: ^PE10
position_endstop: 265
position_max: 265
position_min: 0
homing_speed: 50
homing_retract_dist: 5

[stepper_z]
step_pin: PB7
dir_pin: PE5
enable_pin: !PD7
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -15
homing_speed: 8
second_homing_speed: 3

# --- CR-Touch (BLTouch) ---
[bltouch]
sensor_pin: ^PD13
control_pin: PD12
x_offset: 18
y_offset: 43
z_offset: 2.66
pin_move_time: 0.680
probe_with_touch_mode: True
stow_on_each_sample: False
pin_up_touch_mode_reports_triggered: False
pin_up_reports_not_triggered: True

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30, 50 
mesh_max: 280, 210
probe_count: 5, 5
algorithm: lagrange
fade_start: 1
fade_end: 10
fade_target: 0

[safe_z_home]
home_xy_position: 132, 82
speed: 100
z_hop: 5
z_hop_speed: 5

# --- Z stop bottom
[gcode_button z_max_safety]
pin: ^PE11
press_gcode:
  M112 # Nödstopp - avbryter allt omedelbart
  {action_respond_info("Z-MAX trigger: Emergency Stop!")}

[extruder]
step_pin: PB5
dir_pin: !PE3
enable_pin: !PD7
microsteps: 16
rotation_distance: 26.359
gear_ratio: 3.5:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PD14
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0
max_extrude_only_velocity: 60   # Begränsar hur fort E kan röra sig (mm/s)
max_extrude_only_accel: 600     # Begränsar accelerationen för E
max_extrude_cross_section: 5    # Säkerhet för Orca Slicers purge/line-bredd

[heater_bed]
heater_pin: PC10 
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 69.0
#pid_Ki: 1.0
#pid_Kd: 1000
min_temp: 0
max_temp: 110

[fan] # Cooling fan for part
pin: PA2
kick_start_time: 0.5

[heater_fan hotend_fan] # For hotend housing
pin: PA3
heater: extruder
heater_temp: 50.0
max_power: 1
shutdown_speed : 0

[fan_generic enclosure_fans]
pin: PC9
kick_start_time: 0.5

[filament_switch_sensor runout_sensor]
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament runout! Change filament and resume.
insert_gcode:
    M117 Filament inserted.
switch_pin: ^!PE14

# --- Macros ---

[exclude_object]

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

[output_pin Light]
pin: PC11
pwm: False
value: 1                             ; Turns on when Klipper starts
shutdown_value: 0                    ; Turns off if clipper crashes for saftey

[gcode_button door_sensor]
pin: ^PE13
press_gcode:
  {action_respond_info("Door open!")}
release_gcode:
  {action_respond_info("Door closed!")}


[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    M117 Quickstart...
    G90                             ; Absolut positionering
    M140 S{BED_TEMP}                ; Starta bäddvärme direkt (vänta ej)
    M104 S150                       ; Förvärm nozzle till 150C (vänta ej)
    
    # Homea om det behövs medan det blir varmt
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Åk till wiper direkt för att spara tid
    G1 X152 Y264 Z10 F6000 

    # Vänta på att bädden når måltemp och nozzle når 150C
    M117 Waiting on heating...
    M190 S{BED_TEMP}
    M109 S150 

    M117 Cleaning nozzle...
    CLEAN_NOZZLE

    # --- MESH-LOGIK ---
    # Istället för att kalibrera varje gång, ladda den sparade profilen.
    # Om du absolut vill kalibrera varje gång, behåll BED_MESH_CALIBRATE här,
    # men ADAPTIVE=1 (om din Klipper stöder det) gör det mycket snabbare.
    M117 Create mesh...
    BED_MESH_CALIBRATE
    #M117 Loading default bed mesh...
    #BED_MESH_PROFILE LOAD=default 
    # ------------------

    M117 Heating the last degrees...
    M109 S{EXTRUDER_TEMP}           ; Vänta på arbetstemp (går fort från 150C)

    # En snabb sista rengöring när plasten är lättrinnig
    CLEAN_NOZZLE 
    
    M117 Purge Line...
    G92 E0
    G1 Z2.0 F3000
    G1 X10.1 Y20 Z0.28 F5000.0
    G1 X10.1 Y145.0 Z0.28 F1500.0 E10
    G1 X10.4 Y145.0 Z0.28 F5000.0
    G1 X10.4 Y20 Z0.28 F1500.0 E20
    G92 E0
    G1 Z2.0 F3000
    M117 Printing...

[gcode_macro END_PRINT]
gcode:
    # 1. Stäng av värme och fläktar
    M140 S0                         # Stäng av bädden
    M104 S0                         # Stäng av munstycket
    M106 S0                         # Stäng av fläkten
    
    # 2. Relativa koordinater för ett litet lyft
    G91                             # Positionering: Relativ
    G1 Z10 F600                     # Lyft Z 100mm direkt för att gå fritt
    G90                             # Positionering: Absolut
    
    # 3. Flytta axlarna till dina önskade positioner
    G1 X150 Y240 F3000                
    
    # 4. Extra lyft av Z (om plats finns)
    # Här kan du lägga till fler millimeter, men var försiktig med din sensor
    G1 Z300 F600                     

    # 5. Inaktivera motorerna (valfritt, men skönt för att spara ström/värme)
    M84

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(220)|float %}
    {% set speed = params.SPEED|default(300) %}
    
    # 1. Åk till prep-position (Mitten fram, 10cm upp)
    {action_respond_info("Moving to prep position...")}
    G90 ; Absolut positionering
    {% if printer.toolhead.position.z < 100 %}
        G1 Z100 F600 ; Lyft Z till 100mm om den är under
    {% endif %}
    G1 X155 Y10 F6000 ; Mitten av X, längst fram på Y

    # 2. Kontrollera temperatur
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("Heating nozzle to " ~ EXTRUDER_TEMP ~ "C...")}
        M117 Heating...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 3. Genomför laddning
    {action_respond_info("Loading filament...")}
    SAVE_GCODE_STATE NAME=load_state
    M83 ; Relativ extruder
    G92 E0
    G1 E50 F{speed}   ; Snabbmatning
    G1 E25 F150     ; Långsam purge
    G92 E0
    RESTORE_GCODE_STATE NAME=load_state
    M117 Load complete
    {action_respond_info("Load complete. Clean nozzle and resume.")}

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(220)|float %}
    {% set speed = params.SPEED|default(300) %}

    # 1. Åk till prep-position
    {action_respond_info("Moving to prep position...")}
    G90
    {% if printer.toolhead.position.z < 100 %}
        G1 Z100 F600
    {% endif %}
    G1 X155 Y10 F6000

    # 2. Kontrollera temperatur
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("Heating nozzle to " ~ EXTRUDER_TEMP ~ "C...")}
        M117 Heating...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 3. Genomför urladdning
    {action_respond_info("Unloading filament...")}
    SAVE_GCODE_STATE NAME=unload_state
    M83                            # Relativ extrudering
    G1 E10 F300                    # Tryck ut lite först för att rensa spetsen
    G1 E-80 F2000                  # Snabb tillbakadragning
    M82                            # Absolut extrudering

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set x_park = 10 %}
    {% set y_park = 10 %}
    {% set z_park_delta = 10 %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    
    {% if act_z < (max_z - z_park_delta) %}
        {% set z_safe = z_park_delta %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}

    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-1 Z{z_safe} F900              ; Retract and lift Z
    G90
    G1 X{x_park} Y{y_park} F6000       ; Park in a safe place (X10 Y10)

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E1 F300                         ; Prime nozzle
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro TOGGLE_LIGHT]
gcode:
  {% if printer["output_pin Light"].value == 1 %}
    SET_PIN PIN=Light VALUE=0
  {% else %}
    SET_PIN PIN=Light VALUE=1
  {% endif %}

[gcode_macro CLEAN_NOZZLE]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    G90                                ; Absolute positioning 
    G1 Z10 F3000                       ; Lift Z for saftey
    G1 X132 Y258 F6000                 ; Go to starting point
    G1 Z1.0 F1500                      ; Lower Z to cleaning height
    
    # Rub nozzle in Y direction
    G1 Y264 F3000
    G1 Y258 F3000
    G1 Y264 F3000
    G1 Y258 F3000
    
    G1 Z10 F3000                       ; Lift Z in the end
    G1 X150 Y125 F6000                 ; Travel to center

[gcode_macro CREATE_HEIGHTMAP]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    
    M117 Heating bed to target temp {BED_TEMP}C...
    M140 S{BED_TEMP}          ; Start preheat
    
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                   ; Home if neaded
    {% endif %}
    
    M190 S{BED_TEMP}          ; Wait until right temperature
    
    M117 Skapar mesh...
    BED_MESH_CLEAR            ; clear old mesh
    BED_MESH_CALIBRATE        ; Start calibration
    
    M117 Mesh klar!
    G1 X150 Y125 Z50 F6000    ; Park in center to cool down
    SAVE_CONFIG               ; Save config and restart
