[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-path/platform-ff540000.usb-usbv2-0:1.4:1.0-port0
restart_method: command

[force_move]
enable_force_move: True

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 1500
minimum_cruise_ratio: 0.5
square_corner_velocity: 5.0
max_z_velocity: 8
max_z_accel: 100

[output_pin motor_power]
pin: PD0
value: 1

[stepper_x]
step_pin: PB9
dir_pin: !PC13
enable_pin: !PD7
rotation_distance: 40
microsteps: 16
endstop_pin: ^PE9
position_endstop: 310
position_max: 310
position_min: 0
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PE6
enable_pin: !PD7
rotation_distance: 40
microsteps: 16
endstop_pin: ^PE10
position_endstop: 265
position_max: 265
position_min: 0
homing_speed: 50
homing_retract_dist: 5

[stepper_z]
step_pin: PB7
dir_pin: PE5
enable_pin: !PD7
rotation_distance: 8
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 300
position_min: -15
homing_speed: 8
second_homing_speed: 3

# --- CR-Touch (BLTouch) ---
[bltouch]
sensor_pin: ^PD13
control_pin: PD12
x_offset: 18
y_offset: 43
z_offset: 2.64                  # Calibrate with paper and test prints
pin_move_time: 0.680
probe_with_touch_mode: True
stow_on_each_sample: False
pin_up_touch_mode_reports_triggered: False
pin_up_reports_not_triggered: True

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30, 50 
mesh_max: 280, 210
probe_count: 5, 5
algorithm: lagrange
fade_start: 1
fade_end: 10
fade_target: 0

[safe_z_home]
home_xy_position: 132, 82
speed: 100
z_hop: 5
z_hop_speed: 5

# --- Z stop bottom
[gcode_button z_max_safety]
pin: ^PE11
press_gcode:
  M112                       # GCode for emergency stop
  {action_respond_info("Z-MAX trigger: Emergency Stop!")}

[extruder]
step_pin: PB5
dir_pin: !PE3
enable_pin: !PD7
microsteps: 16
rotation_distance: 26.359
gear_ratio: 3.5:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PD14
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0
max_extrude_only_velocity: 60
max_extrude_only_accel: 600
max_extrude_cross_section: 5

[heater_bed]
heater_pin: PC10 
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
min_temp: 0
max_temp: 110

[fan]                         # Cooling fan for part cooling
pin: PA2
kick_start_time: 0.5

[heater_fan hotend_fan]       # For hotend housing
pin: PA3
heater: extruder
heater_temp: 50.0
max_power: 1
shutdown_speed : 0

[fan_generic enclosure_fans]
pin: PC9
kick_start_time: 0.5

[filament_switch_sensor runout_sensor]
pause_on_runout: True
runout_gcode:
    PAUSE
    M117 Filament runout! Change filament and resume.
insert_gcode:
    M117 Filament inserted.
switch_pin: ^!PE14

[exclude_object]

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[display_status]

# ---------- Macros ----------

[output_pin Light]
pin: PC11
pwm: False
value: 1                             ; Turns on when Klipper starts
shutdown_value: 0                    ; Turns off if clipper crashes for saftey

[gcode_button door_sensor]
pin: ^PE13
press_gcode:
  {action_respond_info("Door open!")}
release_gcode:
  {action_respond_info("Door closed!")}


[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    M117 Quickstart...
    G90                             ; Absolute positioning
    M140 S{BED_TEMP}                ; Start heating the build plate
    M104 S150                       ; Pre heat nozzle
    
    # Home XYZ if needed while heating
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    # Go to safe place near wiper while heating
    G1 X152 Y264 Z10 F6000 

    # Wait on the nozzle to reach 150C
    M117 Waiting on heating...
    M190 S{BED_TEMP}
    M109 S150 

    M117 Cleaning nozzle...
    CLEAN_NOZZLE

    # --- MESH-LOGIC ---
    # --- Create fresh heightmap on each print
    M117 Create mesh...
    BED_MESH_CALIBRATE
    # --- OR create one with CREATE_HEIGHTMAP and load this instead
    #M117 Loading default bed mesh...
    #BED_MESH_PROFILE LOAD=default 
    # ------------------

    M117 Heating the last degrees...
    M109 S{EXTRUDER_TEMP}           ; Wait for nozzle working temp

    # En snabb sista rengöring när plasten är lättrinnig
    CLEAN_NOZZLE 
    
    M117 Purge Line...
    G92 E0
    G1 Z2.0 F3000
    G1 X10.1 Y20 Z0.28 F5000.0
    G1 X10.1 Y145.0 Z0.28 F1500.0 E10
    G1 X10.4 Y145.0 Z0.28 F5000.0
    G1 X10.4 Y20 Z0.28 F1500.0 E20
    G92 E0
    G1 Z2.0 F3000
    M117 Printing...

[gcode_macro END_PRINT]
gcode:
    # 1. Turn off heating elements and fan
    M140 S0                         ; Turn off bed heating
    M104 S0                         ; Turn off nozzle heating
    M106 S0                         ; Turn off fan
    
    # 2. Relative cordinates for a quick jump
    G91                             ; Positiononing relative
    G1 Z10 F600                     ; Lift Z 10mm for XY movement
    G90                             ; Positioning: Absolut
    
    # 3. Move XY to the back
    G1 X150 Y240 F3000                
    
    # 4. Lower bed to bottom of chamber
    G1 Z300 F600                     

    # 5. Turn off all motors
    M84

[gcode_macro LOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(220)|float %}
    {% set speed = params.SPEED|default(300) %}
    
    # 1. Travel to prepping cordinates
    {action_respond_info("Moving to prep position...")}
    G90
    {% if printer.toolhead.position.z < 100 %}
        G1 Z100 F600                ; Give some space on Z
    {% endif %}
    G1 X155 Y10 F6000               ; XY to middle in front

    # 2. Wait for temperature
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("Heating nozzle to " ~ EXTRUDER_TEMP ~ "C...")}
        M117 Heating...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 3. Commit loading
    {action_respond_info("Loading filament...")}
    SAVE_GCODE_STATE NAME=load_state
    M83                               ; Relative extruder
    G92 E0
    G1 E50 F{speed}                   ; Quickfeed
    G1 E25 F150                       ; Slow purge
    G92 E0
    RESTORE_GCODE_STATE NAME=load_state
    M117 Load complete
    {action_respond_info("Load complete. Clean nozzle and resume.")}

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(220)|float %}
    {% set speed = params.SPEED|default(300) %}

    # 1. Travel to prepping position
    {action_respond_info("Moving to prep position...")}
    G90
    {% if printer.toolhead.position.z < 100 %}
        G1 Z100 F600
    {% endif %}
    G1 X155 Y10 F6000

    # 2. Wait for nozzle temperature
    {% if printer.extruder.temperature < 180 %}
        {action_respond_info("Heating nozzle to " ~ EXTRUDER_TEMP ~ "C...")}
        M117 Heating...
        M109 S{EXTRUDER_TEMP}
    {% endif %}

    # 3. Commit unload
    {action_respond_info("Unloading filament...")}
    SAVE_GCODE_STATE NAME=unload_state
    M83                            ; Relative extrude
    G1 E10 F300                    ; Push out a little to unclog nozzle
    G1 E-80 F2000                  # Quick reverse
    M82                            # Absolute extrude

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% set x_park = 10 %}
    {% set y_park = 10 %}
    {% set z_park_delta = 10 %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    
    {% if act_z < (max_z - z_park_delta) %}
        {% set z_safe = z_park_delta %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}

    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-1 Z{z_safe} F900              ; Retract and lift Z
    G90
    G1 X{x_park} Y{y_park} F6000       ; Park in a safe place (X10 Y10)

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E1 F300                         ; Prime nozzle
    G90
    RESTORE_GCODE_STATE NAME=PAUSE_state MOVE=1
    BASE_RESUME

[gcode_macro TOGGLE_LIGHT]
gcode:
  {% if printer["output_pin Light"].value == 1 %}
    SET_PIN PIN=Light VALUE=0
  {% else %}
    SET_PIN PIN=Light VALUE=1
  {% endif %}

[gcode_macro CLEAN_NOZZLE]
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    
    G90                                ; Absolute positioning 
    G1 Z10 F3000                       ; Lift Z for saftey
    G1 X132 Y258 F6000                 ; Go to starting point
    G1 Z1.0 F1500                      ; Lower Z to cleaning height
    
    # Rub nozzle in Y direction
    G1 Y264 F3000
    G1 Y258 F3000
    G1 Y264 F3000
    G1 Y258 F3000
    
    G1 Z10 F3000                       ; Lift Z in the end
    G1 X150 Y125 F6000                 ; Travel to center

[gcode_macro CREATE_HEIGHTMAP]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    
    M117 Heating bed to target temp {BED_TEMP}C...
    M140 S{BED_TEMP}                  ; Start preheat
    
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28                           ; Home if neaded
    {% endif %}
    
    M190 S{BED_TEMP}                  ; Wait until right temperature
    
    M117 Skapar mesh...
    BED_MESH_CLEAR                    ; clear old mesh
    BED_MESH_CALIBRATE                ; Start calibration
    
    M117 Mesh klar!
    G1 X150 Y125 Z50 F6000            ; Park in center to cool down
    SAVE_CONFIG                       ; Save config and restart
